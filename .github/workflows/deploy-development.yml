name: Deploy to Development

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          persist-credentials: false

      - name: Configure git credentials
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run semantic-release
        id: semantic
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          npm run release
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          [ "$BEFORE" != "$AFTER" ] && echo "released=true" >> $GITHUB_OUTPUT || echo "released=false" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  build:
    name: Build
    runs-on: ubuntu-latest
    environment: development
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: out/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: out/

      - name: Deploy to Firebase Hosting (dev)
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          npx --yes firebase-tools@13 deploy \
            --only hosting:dev \
            --project kaeatsaan-dev-ebfb7 \
            --non-interactive 2>&1 | tee /tmp/deploy.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "is the current active version\|FAILED_PRECONDITION" /tmp/deploy.log; then
            echo "Already active version — no-op."
            exit 0
          fi
          exit $EXIT
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KAEATSAAN_DEV_EBFB7 }}

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [release, deploy]
    if: always() && needs.release.outputs.released == 'true'
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "embeds": [{
              "title": "✅ Development Deployment Successful",
              "description": "**Branch:** `${{ github.ref_name }}`\n**Commit:** `${{ github.sha }}`\n**By:** ${{ github.actor }}",
              "color": 3066993,
              "footer": {"text": "KaEatSaan Dev"},
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }]
          }' ${{ secrets.DISCORD_DEPLOYMENTS_WEBHOOK_URL }}

      - name: Notify failure
        if: needs.deploy.result != 'success'
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "embeds": [{
              "title": "❌ Development Deployment Failed",
              "description": "**Branch:** `${{ github.ref_name }}`\n**Commit:** `${{ github.sha }}`\n**By:** ${{ github.actor }}\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 15158332,
              "footer": {"text": "KaEatSaan Dev"},
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }]
          }' ${{ secrets.DISCORD_DEPLOYMENTS_WEBHOOK_URL }}
